<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Meta configuration -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>FreshMart - Online Grocery System</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= TOP NAVIGATION BAR ================= -->
<div class="topbar">
    <a href="#">Admin Dashboard</a>
    <a href="#">My Orders</a>
    <a href="#">Login</a>
    <a href="#">Register</a>
</div>

<!-- ================= HEADER SECTION ================= -->
<div class="header">

    <!-- Logo -->
    <div class="logo">
        <img src="images/logo.jpg" alt="FreshMart Logo">
    </div>

    <!-- Search Bar -->
    <div class="search">
        <input type="text" placeholder="Search for fresh groceries..." onkeyup="search(this.value)">
        <button>Search</button>
    </div>

    <!-- Shopping Cart Icon -->
    <div class="cart" onclick="toggleCart()">
        <span>🛒</span> My Cart (<span id="count">0</span>)
    </div>

</div>

<!-- ================= CATEGORY FILTER ================= -->
<div class="categories">
    <div class="cat" onclick="filter('all')">🏢 ALL</div>
    <div class="cat" onclick="filter('fruit')">🍎 FRUITS</div>
    <div class="cat" onclick="filter('veg')">🥬 VEGETABLES</div>
    <div class="cat" onclick="filter('dairy')">🥛 DAIRY</div>
</div>

<!-- ================= BANNER ================= -->
<div class="banner">
    <h1>FRESHMART</h1>
    <p>Premium Quality Groceries Delivered Fast</p>
</div>

<!-- ================= PRODUCT LIST ================= -->
<div class="products">
    <h2 style="margin-bottom: 25px;">Featured Products</h2>

    <!-- Product Grid -->
    <div class="grid" id="grid"></div>
</div>

<!-- ================= CART SIDE PANEL ================= -->
<div class="cart-panel" id="cartPanel">

    <!-- Cart Header -->
    <div class="cart-header">
        <h3>Shopping Cart</h3>
        <button onclick="toggleCart()" style="border:none; background:none; cursor:pointer;">✕</button>
    </div>

    <!-- Cart Items -->
    <div id="items" style="max-height: 60vh; overflow-y: auto;"></div>

    <!-- Total & Checkout -->
    <div style="margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px;">
        <h4>
            Total:
            <span style="float:right;">
                RM <span id="total">0.00</span>
            </span>
        </h4>

        <button class="btn-checkout" onclick="checkout()">
            Checkout Now
        </button>
    </div>

</div>

<!-- ================= JAVASCRIPT ================= -->
<script>

// ================= PRODUCT DATA =================
// Contains product details and stock levels
const products=[
    {id:1, name:"Red Apple", price:3.50, cat:"fruit", img:"images/apple.jpg", stock: 10},
    {id:2, name:"Tomato", price:2.20, cat:"veg", img:"images/tomato.jpg", stock: 15},
    {id:3, name:"Fresh Milk", price:8.80, cat:"dairy", img:"images/milk.jpg", stock: 5},
    {id:4, name:"Wholemeal Bread", price:4.20, cat:"dairy", img:"images/bread.jpg", stock: 8}
];

// Store cart items
let cart=[];

// ================= DISPLAY PRODUCTS =================
// Render products dynamically into grid
function show(list){
    let html="";
    list.forEach(p=>{
        const isOut = p.stock <= 0;

        html+=`
        <div class="card">
            <img src="${p.img}">
            <h4>${p.name}</h4>
            <p class="price">RM ${p.price.toFixed(2)}</p>
            <p class="stock-tag">In Stock: ${p.stock}</p>
            <button ${isOut ? 'disabled' : ''} onclick="add(${p.id})">
                ${isOut ? 'Out of Stock' : 'Add to Cart'}
            </button>
        </div>`;
    });

    document.getElementById("grid").innerHTML=html;
}

// Initial load
show(products);

// ================= FILTER FUNCTION =================
// Filter products by category
function filter(c){
    if(c==="all") show(products);
    else show(products.filter(p=>p.cat===c));
}

// ================= SEARCH FUNCTION =================
// Search products by name
function search(t){
    t=t.toLowerCase();
    show(products.filter(p=>p.name.toLowerCase().includes(t)));
}

// ================= ADD TO CART =================
// Add item to cart and update stock
function add(id){
    const product = products.find(p=>p.id===id);

    if(product.stock > 0) {
        product.stock--;
        cart.push({...product});
        update();
        show(products);
    }
}

// ================= UPDATE CART =================
// Update UI and calculate total
function update(){
    document.getElementById("count").innerText = cart.length;

    let total = 0, html = "";

    cart.forEach((i)=>{
        total += i.price;

        html += `
        <div class="cart-item">
            <span>${i.name}</span>
            <span>RM ${i.price.toFixed(2)}</span>
        </div>`;
    });

    document.getElementById("items").innerHTML = html;
    document.getElementById("total").innerText = total.toFixed(2);
}

// ================= TOGGLE CART =================
// Show / hide cart panel
function toggleCart(){
    document.getElementById("cartPanel").classList.toggle("active");
}

// ================= CHECKOUT =================
// Simulate checkout process
function checkout(){
    alert("Proceeding to checkout...");
}

</script>

</body>
</html>
